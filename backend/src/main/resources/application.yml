spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:admin_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: utf-8
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

server:
  port: 3001

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: YWRtaW4tc2VjcmV0LWtleS0yMDI0LTAxLTAxLXRoaXMtaXMtYS12ZXJ5LWxvbmctc2VjcmV0LWtleQ==
  expiration: 86400000
